<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIVE EARTH — 世界のライブカメラ</title>
<meta name="description" content="世界中のライブカメラを地図から手軽に閲覧。都市・自然・ビーチ・動物・宇宙のライブ映像をひとつの地図で。">

<!-- OGP（SNSシェア用。assets/ogp.png を用意したら有効になります） -->
<meta property="og:title" content="LIVE EARTH — 世界のライブカメラ">
<meta property="og:description" content="世界中のライブカメラを地図から手軽に閲覧。">
<meta property="og:type" content="website">

<!-- Leaflet (地図エンジン / 無料・キー不要) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=JetBrains+Mono:wght@400;600&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0a0e14; --panel:#0f141d; --panel-2:#141b27; --line:#1f2a3a;
    --ink:#e7edf5; --muted:#7d8da3; --accent:#34e0a1; --accent-2:#ff5470;
    --amber:#ffb454; --blue:#5cc8ff; --violet:#b794ff;
    --display:'Bricolage Grotesque', sans-serif;
    --body:'Spline Sans', system-ui, sans-serif;
    --mono:'JetBrains Mono', ui-monospace, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);overflow:hidden;}

  .app{display:grid;grid-template-columns:340px 1fr;grid-template-rows:64px 1fr;height:100vh;}
  header{grid-column:1 / -1;display:flex;align-items:center;gap:18px;padding:0 20px;
    background:linear-gradient(180deg,#0d121b,#0a0e14);border-bottom:1px solid var(--line);z-index:1200;}
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand .mark{font-family:var(--display);font-weight:800;font-size:22px;letter-spacing:-.5px;
    background:linear-gradient(92deg,#fff,#9fe9cf);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .brand .sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
  .livepill{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12px;color:var(--accent);
    padding:5px 11px;border:1px solid rgba(52,224,161,.3);border-radius:999px;background:rgba(52,224,161,.06);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
  .spacer{flex:1;}
  .modeswitch{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;font-family:var(--mono);font-size:12px;}
  .modeswitch button{background:transparent;color:var(--muted);border:0;padding:9px 14px;cursor:pointer;transition:.18s;white-space:nowrap;}
  .modeswitch button.active{background:var(--accent);color:#06231a;font-weight:600;}

  aside{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;}
  .search{padding:16px 16px 8px;}
  .search input{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    padding:11px 13px;border-radius:10px;font-family:var(--body);font-size:14px;outline:none;transition:.18s;}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(52,224,161,.12);}
  .filters{display:flex;flex-wrap:wrap;gap:7px;padding:6px 16px 14px;border-bottom:1px solid var(--line);}
  .chip{font-family:var(--mono);font-size:11px;letter-spacing:.3px;color:var(--muted);
    border:1px solid var(--line);background:transparent;border-radius:999px;padding:5px 11px;cursor:pointer;transition:.15s;}
  .chip:hover{border-color:var(--muted);color:var(--ink);}
  .chip.on{color:#06231a;font-weight:600;}
  .list{flex:1;overflow-y:auto;padding:8px;}
  .list::-webkit-scrollbar{width:8px;}
  .list::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
  .cam{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;cursor:pointer;transition:.15s;border:1px solid transparent;}
  .cam:hover{background:var(--panel-2);border-color:var(--line);}
  .cam .swatch{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor;}
  .cam .meta{min-width:0;flex:1;}
  .cam .name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cam .loc{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cam .pin{font-family:var(--mono);font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:3px 7px;opacity:0;transition:.15s;}
  .cam:hover .pin{opacity:1;}
  .cam .pin:hover{color:var(--accent);border-color:var(--accent);}
  .foot{padding:10px 16px;border-top:1px solid var(--line);font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.6;}
  .info{padding:24px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6;}

  #map{height:100%;width:100%;background:#0a0e14;}
  .leaflet-container{background:#0a0e14;font-family:var(--body);}
  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:14px;
    box-shadow:0 18px 50px rgba(0,0,0,.6);padding:0;overflow:hidden;}
  .leaflet-popup-content{margin:0;width:340px !important;}
  .leaflet-popup-tip{background:var(--panel);border:1px solid var(--line);}
  .leaflet-popup-close-button{color:var(--muted) !important;font-size:20px !important;padding:8px 9px 0 0 !important;}
  .pop-head{padding:13px 15px 11px;}
  .pop-title{font-family:var(--display);font-weight:600;font-size:17px;line-height:1.15;}
  .pop-loc{font-family:var(--mono);font-size:11px;color:var(--accent);margin-top:5px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .pop-cat{font-family:var(--mono);font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:2px 7px;text-transform:uppercase;}
  .pop-video{position:relative;aspect-ratio:16/9;background:#000;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .pop-video iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}

  .vid-wrap{position:relative;width:100%;height:100%;background:#000 center/cover no-repeat;cursor:pointer;overflow:hidden;}
  .vid-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
  .vid-wrap .play-ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    background:linear-gradient(180deg,rgba(0,0,0,.15),rgba(0,0,0,.55));transition:.2s;}
  .vid-wrap:hover .play-ui{background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.4));}
  .play-btn{width:56px;height:56px;border-radius:50%;background:rgba(255,84,112,.92);color:#fff;display:flex;align-items:center;justify-content:center;
    font-size:20px;padding-left:4px;box-shadow:0 6px 24px rgba(0,0,0,.5);transition:.2s;}
  .vid-wrap:hover .play-btn{transform:scale(1.08);background:#ff5470;}
  .play-cap{font-family:var(--mono);font-size:11px;color:#fff;letter-spacing:1px;opacity:.9;}
  .vid-fallback{position:absolute;left:0;right:0;bottom:0;font-family:var(--mono);font-size:10px;color:#cfd8e6;background:rgba(0,0,0,.6);padding:5px 8px;text-align:center;}
  .vid-fallback a{color:var(--blue);}

  .link-card{display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 120% at 50% 0%, #16202e, #0b0f16);}
  .link-inner{text-align:center;padding:14px;}
  .link-note{font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
  .link-btn{display:inline-block;font-family:var(--mono);font-size:13px;color:#06231a;background:var(--accent);
    text-decoration:none;padding:9px 18px;border-radius:9px;font-weight:600;transition:.15s;}
  .link-btn:hover{filter:brightness(1.08);transform:translateY(-1px);}

  .local-card{background:#000 center/cover no-repeat;}
  .local-veil{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    background:linear-gradient(180deg,rgba(0,0,0,.55),rgba(0,0,0,.78));padding:14px;text-align:center;}
  .local-note{font-family:var(--mono);font-size:11px;color:#ffd9a0;line-height:1.5;}

  .still{width:100%;height:100%;object-fit:cover;display:block;}
  .still-badge{position:absolute;left:8px;bottom:8px;font-family:var(--mono);font-size:10px;color:#cfd8e6;background:rgba(0,0,0,.6);padding:3px 8px;border-radius:6px;}

  .iss-marker{position:relative;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:20px;filter:drop-shadow(0 0 6px #fff);}
  .iss-ring{position:absolute;inset:-4px;border-radius:50%;border:1.5px solid #fff;opacity:.5;animation:ring 2.4s infinite;}
  .pop-foot{padding:10px 15px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .pop-foot a{font-family:var(--mono);font-size:11px;color:var(--blue);text-decoration:none;}
  .pop-foot a:hover{text-decoration:underline;}

  .cam-marker{position:relative;width:14px;height:14px;}
  .cam-marker .ring{position:absolute;inset:-6px;border-radius:50%;border:1.5px solid currentColor;opacity:.45;animation:ring 2.4s infinite;}
  .cam-marker .core{position:absolute;inset:0;border-radius:50%;background:currentColor;box-shadow:0 0 12px currentColor;}
  @keyframes ring{0%{transform:scale(.6);opacity:.6;}100%{transform:scale(1.8);opacity:0;}}

  .marker-cluster{background:rgba(52,224,161,.12);}
  .marker-cluster div{background:rgba(52,224,161,.85);color:#06231a;font-family:var(--mono);font-weight:600;}

  #pinDeck{position:absolute;right:14px;bottom:14px;display:flex;flex-direction:column;gap:10px;z-index:1100;width:300px;max-height:calc(100% - 28px);overflow:auto;}
  .mini{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 12px 30px rgba(0,0,0,.5);}
  .mini .bar{display:flex;align-items:center;gap:8px;padding:8px 10px;}
  .mini .bar .swatch{width:8px;height:8px;border-radius:50%;box-shadow:0 0 8px currentColor;}
  .mini .bar .t{font-size:12px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mini .bar .x{cursor:pointer;color:var(--muted);font-family:var(--mono);font-size:14px;line-height:1;border:0;background:none;}
  .mini .bar .x:hover{color:var(--accent-2);}
  .mini .vid{position:relative;aspect-ratio:16/9;background:#000;}
  .mini .vid iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}

  .menutoggle{display:none;}
  @media (max-width:780px){
    .app{grid-template-columns:1fr;}
    aside{position:absolute;top:64px;bottom:0;left:0;width:84%;max-width:340px;z-index:1300;transform:translateX(-100%);transition:.25s;}
    aside.open{transform:none;}
    .menutoggle{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);cursor:pointer;}
    .brand .sub{display:none;}
    #pinDeck{width:200px;}
    .leaflet-popup-content{width:280px !important;}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <button class="menutoggle" id="menuBtn" aria-label="menu">☰</button>
    <div class="brand">
      <span class="mark">LIVE EARTH</span>
      <span class="sub">global cam explorer</span>
    </div>
    <span class="livepill"><span class="dot"></span><span id="liveCount">0</span> CAMERAS LIVE</span>
    <span class="spacer"></span>
    <div class="modeswitch">
      <button id="modePopup" class="active">ポップアップ</button>
      <button id="modeMini">ミニ窓固定</button>
    </div>
  </header>

  <aside id="sidebar">
    <div class="search">
      <input id="searchBox" placeholder="🔍  カメラ名・地名で検索…" />
    </div>
    <div class="filters" id="filters"></div>
    <div class="list" id="camList"><div class="info">カメラデータを読み込み中…</div></div>
    <div class="foot">
      映像はYouTube Liveを埋め込み表示。<br>
      ⚠ ローカルで開くと再生不可（エラー153）。<br>
      公開URL（https）で開くと再生できます。<br>
      地図 © OpenStreetMap / CARTO ・ 映像 © 各配信者
    </div>
  </aside>

  <div style="position:relative;min-height:0;">
    <div id="map"></div>
    <div id="pinDeck"></div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>

<script>
/* =========================================================================
   カメラ・データは data/cameras.json に分離しています。
   カメラの追加・修正は cameras.json を編集してください（このファイルは触らない）。
   ========================================================================= */
let CATS = {}, CAMERAS = [], activeCats = new Set();
const markerById = {};
let issMarker = null, issCam = null;

/* ---------- 地図初期化 ---------- */
const map = L.map('map', {worldCopyJump:true, zoomControl:false, minZoom:2, closePopupOnClick:false})
  .setView([25, 5], 3);
L.control.zoom({position:'bottomleft'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:19,
}).addTo(map);

/* http/https から開かれているか（ローカルファイルやサンドボックスでは埋め込み再生不可） */
const EMBED_OK = /^https?:$/.test(location.protocol);

const cluster = L.markerClusterGroup({
  maxClusterRadius:45,
  iconCreateFunction:(c)=>L.divIcon({ html:`<div>${c.getChildCount()}</div>`, className:'marker-cluster', iconSize:[36,36] })
});

/* ---------- URL・埋め込みヘルパー ---------- */
function ytId(cam){ return (cam.youtube && typeof cam.youtube !== 'object') ? cam.youtube : null; }
function externalURL(cam){
  if(cam.link) return cam.link;
  if(cam.image) return cam.image.page || cam.image.url;
  if(typeof cam.youtube === 'object' && cam.youtube.channel) return `https://www.youtube.com/channel/${cam.youtube.channel}/live`;
  return `https://www.youtube.com/watch?v=${cam.youtube}`;
}
function thumbURL(cam){ const id = ytId(cam); return id ? `https://i.ytimg.com/vi/${id}/hqdefault.jpg` : ''; }
function embedURL(cam, autoplay){
  const base = (typeof cam.youtube === 'object' && cam.youtube.channel)
    ? `https://www.youtube.com/embed/live_stream?channel=${cam.youtube.channel}`
    : `https://www.youtube.com/embed/${cam.youtube}`;
  const sep = base.includes('?') ? '&' : '?';
  return `${base}${sep}autoplay=${autoplay?1:0}&mute=1&playsinline=1&rel=0`;
}

/* ---------- 表示ブロック（種別別） ---------- */
let _vidSeq = 0;
function videoBlock(cam){
  const id = 'v'+(_vidSeq++);
  if(cam.link){
    return `<div class="vid-wrap link-card"><div class="link-inner">
              <div class="link-note">${cam.note || '外部サイトでライブ配信中'}</div>
              <a class="link-btn" href="${cam.link}" target="_blank" rel="noopener">ライブを見る ↗</a>
            </div></div>`;
  }
  if(cam.image){
    const sec = cam.image.refresh || 30;
    return `<div class="vid-wrap">
              <img class="still" src="${cam.image.url}" alt="${cam.name}" onerror="this.style.opacity=.25" data-base="${cam.image.url}">
              <div class="still-badge">静止画 / ${sec}秒ごと更新</div>
            </div>`;
  }
  const thumb = thumbURL(cam);
  const bg = thumb ? `style="background-image:url('${thumb}')"` : '';
  if(!EMBED_OK){
    return `<div class="vid-wrap local-card" ${bg}><div class="local-veil">
              <div class="local-note">⚠ ローカル実行のため枠内再生不可（153）</div>
              <a class="link-btn" href="${externalURL(cam)}" target="_blank" rel="noopener">YouTubeで見る ↗</a>
            </div></div>`;
  }
  return `<div class="vid-wrap" id="${id}" ${bg} data-embed="${embedURL(cam,true)}" data-watch="${externalURL(cam)}" onclick="playVideo(event,'${id}')">
            <div class="play-ui"><div class="play-btn">▶</div><div class="play-cap">タップで再生</div></div>
          </div>`;
}
function playVideo(ev, id){
  if(ev && ev.stopPropagation) ev.stopPropagation();
  const el = document.getElementById(id);
  if(!el) return;
  const src = el.getAttribute('data-embed'), watch = el.getAttribute('data-watch');
  el.innerHTML = `<iframe src="${src}" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
     <div class="vid-fallback">映像が出ない場合 → <a href="${watch}" target="_blank" rel="noopener">YouTubeで開く ↗</a></div>`;
  el.style.cursor = 'default'; el.onclick = null;
}

/* ---------- ポップアップ ---------- */
function popupHTML(cam){
  const c = CATS[cam.cat] || {label:'', color:'#888'};
  const linkLabel = (cam.link || cam.image) ? '配信ページを開く ↗' : 'YouTubeで開く ↗';
  return `<div class="pop-head">
      <div class="pop-title">${cam.name}</div>
      <div class="pop-loc">📍 ${cam.loc}<span class="pop-cat" style="color:${c.color};border-color:${c.color}55">${c.label}</span></div>
    </div>
    <div class="pop-video">${videoBlock(cam)}</div>
    <div class="pop-foot">
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">${cam.lat.toFixed(3)}, ${cam.lng.toFixed(3)}</span>
      <a href="${externalURL(cam)}" target="_blank" rel="noopener">${linkLabel}</a>
    </div>`;
}

/* ---------- ISS 現在位置に追従（無料API・キー不要） ---------- */
async function updateISS(){
  if(!issMarker || !activeCats.has('space')) return;
  try{
    const r = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
    const d = await r.json();
    issCam.lat = d.latitude; issCam.lng = d.longitude;
    issMarker.setLatLng([d.latitude, d.longitude]);
    const pop = issMarker.getPopup();
    if(pop && pop.isOpen()){
      issCam.loc = `緯度 ${d.latitude.toFixed(2)}, 経度 ${d.longitude.toFixed(2)} ・ 速度 ${Math.round(d.velocity)} km/h`;
      pop.setContent(popupHTML(issCam));
    }
  }catch(e){ /* オフライン時は前回位置を維持 */ }
}
setInterval(updateISS, 5000);

/* ---------- マーカー生成 ---------- */
function buildMarkers(){
  CAMERAS.forEach((cam, i)=>{
    cam.id = i;
    const color = (CATS[cam.cat]||{}).color || '#888';
    const isISS = cam.track === 'iss';
    const icon = L.divIcon({
      className:'', iconSize:isISS?[30,30]:[14,14], iconAnchor:isISS?[15,15]:[7,7],
      html: isISS ? `<div class="iss-marker" title="ISS">🛰️<span class="iss-ring"></span></div>`
                  : `<div class="cam-marker" style="color:${color}"><span class="ring"></span><span class="core"></span></div>`
    });
    const m = L.marker([cam.lat, cam.lng], {icon, zIndexOffset:isISS?1000:0});
    m.bindPopup(()=>popupHTML(cam), {maxWidth:360, minWidth:340, closeButton:true});
    m.on('popupopen', ()=>{ if(VIEW==='mini'){ m.closePopup(); pinCam(cam); }});
    markerById[cam.id] = m;
    if(isISS){ issMarker = m; issCam = cam; map.addLayer(m); }
    else { cluster.addLayer(m); }
  });
  map.addLayer(cluster);
}

/* ---------- 表示モード ---------- */
let VIEW = 'popup';
const btnPopup = document.getElementById('modePopup');
const btnMini  = document.getElementById('modeMini');
btnPopup.onclick = ()=>{ VIEW='popup'; btnPopup.classList.add('active'); btnMini.classList.remove('active'); };
btnMini.onclick  = ()=>{ VIEW='mini';  btnMini.classList.add('active');  btnPopup.classList.remove('active'); map.closePopup(); };

const pinned = new Set();
const deck = document.getElementById('pinDeck');
function pinCam(cam){
  if(pinned.has(cam.id)) return;
  pinned.add(cam.id);
  const color = (CATS[cam.cat]||{}).color || '#888';
  const el = document.createElement('div');
  el.className = 'mini'; el.dataset.id = cam.id;
  el.innerHTML = `<div class="bar">
      <span class="swatch" style="color:${color};background:${color}"></span>
      <span class="t">${cam.name}</span>
      <button class="x" title="閉じる">✕</button>
    </div>
    <div class="vid">${videoBlock(cam)}</div>`;
  el.querySelector('.x').onclick = ()=>{ el.remove(); pinned.delete(cam.id); };
  deck.prepend(el);
}

/* ---------- フィルタ ---------- */
const filtersEl = document.getElementById('filters');
function buildFilters(){
  filtersEl.innerHTML = '';
  Object.entries(CATS).forEach(([key,c])=>{
    const b = document.createElement('button');
    b.className = 'chip on'; b.textContent = c.label;
    b.style.borderColor = c.color+'66'; b.style.background = c.color+'22'; b.style.color = c.color;
    b.onclick = ()=>{
      if(activeCats.has(key)){ activeCats.delete(key); b.classList.remove('on'); b.style.background='transparent'; b.style.color='var(--muted)'; }
      else { activeCats.add(key); b.classList.add('on'); b.style.background=c.color+'22'; b.style.color=c.color; }
      renderList(); applyFilters();
    };
    filtersEl.appendChild(b);
  });
}

/* ---------- リスト ---------- */
const listEl = document.getElementById('camList');
const searchBox = document.getElementById('searchBox');
searchBox.oninput = ()=>{ renderList(); };

function visibleCams(){
  const q = searchBox.value.trim().toLowerCase();
  return CAMERAS.filter(c=> activeCats.has(c.cat) && (!q || c.name.toLowerCase().includes(q) || c.loc.toLowerCase().includes(q)));
}
function renderList(){
  const cams = visibleCams();
  document.getElementById('liveCount').textContent = cams.length;
  listEl.innerHTML = '';
  cams.forEach(cam=>{
    const color = (CATS[cam.cat]||{}).color || '#888';
    const row = document.createElement('div');
    row.className = 'cam';
    row.innerHTML = `<span class="swatch" style="color:${color};background:${color}"></span>
      <div class="meta"><div class="name">${cam.name}</div><div class="loc">${cam.loc}</div></div>
      <button class="pin">PIN</button>`;
    row.querySelector('.meta').onclick = ()=>flyTo(cam);
    row.querySelector('.swatch').onclick = ()=>flyTo(cam);
    row.querySelector('.pin').onclick = (e)=>{ e.stopPropagation(); pinCam(cam); if(window.innerWidth<=780) closeMenu(); };
    listEl.appendChild(row);
  });
  if(!cams.length) listEl.innerHTML = '<div class="info">該当するカメラがありません</div>';
}
function applyFilters(){
  cluster.clearLayers();
  visibleCams().forEach(cam=>{ if(cam.id !== (issCam&&issCam.id)) cluster.addLayer(markerById[cam.id]); });
  if(issMarker){
    if(activeCats.has('space')){ if(!map.hasLayer(issMarker)) map.addLayer(issMarker); updateISS(); }
    else if(map.hasLayer(issMarker)) map.removeLayer(issMarker);
  }
}
function flyTo(cam){
  map.flyTo([cam.lat, cam.lng], 6, {duration:1.1});
  setTimeout(()=>{ if(VIEW==='mini'){ pinCam(cam); } else { markerById[cam.id].openPopup(); } }, 1150);
  if(window.innerWidth<=780) closeMenu();
}

/* ---------- モバイルメニュー ---------- */
const sidebar = document.getElementById('sidebar');
document.getElementById('menuBtn').onclick = ()=>sidebar.classList.toggle('open');
function closeMenu(){ sidebar.classList.remove('open'); }

/* ---------- 静止画カメラの自動更新（image型を追加したとき有効） ---------- */
setInterval(()=>{
  document.querySelectorAll('img.still').forEach(img=>{
    const base = img.getAttribute('data-base');
    img.src = base + (base.includes('?')?'&':'?') + '_t=' + Date.now();
  });
}, 30000);

/* ---------- データ読み込み → 起動 ---------- */
function boot(data){
  CATS = data.categories || {};
  CAMERAS = data.cameras || [];
  activeCats = new Set(Object.keys(CATS));
  buildMarkers();
  buildFilters();
  renderList();
  applyFilters();
}
function showDataError(){
  listEl.innerHTML = '<div class="info">カメラデータを読み込めませんでした。<br><br>'
    + 'ローカルのファイルを直接開くと読み込めません。<br>'
    + '公開URL（https://〇〇.github.io/）で開くか、'
    + 'ローカルでは <b>python -m http.server</b> 等で配信してください。</div>';
}
fetch('data/cameras.json')
  .then(r=>{ if(!r.ok) throw new Error('http '+r.status); return r.json(); })
  .then(boot)
  .catch(showDataError);
</script>
