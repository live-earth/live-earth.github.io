name: Check cameras (daily)

# 毎日 JST 06:00（= UTC 21:00）に自動実行。手動実行も可能。
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write   # data/health.json を push し直すため

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run camera health check
        id: check
        shell: bash
        run: |
          set +e
          python scripts/check_cameras.py | tee result.txt
          code=${PIPESTATUS[0]}
          {
            echo '### LIVE EARTH カメラ死活チェック結果'
            echo ''
            echo '```'
            cat result.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          # ここでは落とさない（先に health.json をコミットするため）
          exit 0

      - name: Commit health.json
        if: always()
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/health.json
          if git diff --cached --quiet; then
            echo "health.json に変更なし"
          else
            git commit -m "chore(health): update camera health status [skip ci]"
            git push
          fi

      - name: Fail if any camera is down
        if: steps.check.outputs.code != '0'
        run: |
          echo "再生不可カメラあり → ジョブを失敗(赤)にします"
          exit 1
